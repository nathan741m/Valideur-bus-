<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valideur Sans Contact</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: white;
    height: 100vh;
}

/* PAGE 1 */
#home {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.header {
    text-align: center;
    padding-top: 50px;
}

.logo {
    width: 110px;
    height: 110px;
    margin: auto;
}

.text {
    text-align: center;
    margin-top: 30px;
}

.text h1 {
    font-size: 36px;
}

.text p {
    font-size: 24px;
}

.clock {
    margin-top: 10px;
    color: #00ffcc;
    font-size: 20px;
}

.footer {
    margin-top: auto;
    padding: 20px;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #1f8ef1;
    color: white;
}

/* PAGE 2 */
#ticket {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    position: relative;
}

/* ✔ COCHE GLOW (celle que tu veux) */
.check {
    position: absolute;
    top: 40px;
    font-size: 30px;
    font-weight: bold;
    color: #00ff6a;
    text-shadow: 0 0 10px #00ff6a;
}

/* TEXTE */
.big {
    font-size: 48px;
    font-weight: bold;
}

.small {
    margin-top: 25px;
    font-size: 24px;
    line-height: 1.6;
}

.bottom {
    position: absolute;
    bottom: 60px;
    width: 100%;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="home">
    <div class="header">
        <svg class="logo" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="40" stroke="#1f8ef1" stroke-width="5" fill="none"/>
            <path d="M30 40 Q50 20 70 40" stroke="#1f8ef1" stroke-width="4" fill="none"/>
            <path d="M35 50 Q50 35 65 50" stroke="#1f8ef1" stroke-width="4" fill="none"/>
            <path d="M40 60 Q50 50 60 60" stroke="#1f8ef1" stroke-width="4" fill="none"/>
        </svg>
    </div>

    <div class="text">
        <h1>Bonjour, bienvenue</h1>
        <p>Vous pouvez valider !</p>
        <p class="clock" id="clock"></p>
    </div>

    <div class="footer">
        <button onclick="validate()">Scanner</button>
    </div>
</div>

<!-- PAGE 2 -->
<div id="ticket">

    <!-- ✔ COCHE -->
    <div class="check">✔ VALIDÉ</div>

    <div class="big">Parfait ! Bon voyage !!</div>

    <div class="small">
        1 Carte voyage pass<br><br>
        Arrêt : <span id="location">...</span><br>
        Heure : <span id="time"></span>
    </div>

    <div class="bottom">Transport validé ✔</div>

</div>

<script>

/* 🔊 SON */
let audioCtx;
function beep() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value = 1000;
    gain.gain.value = 0.3;

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

/* 📳 VIBRATION */
function vibrate() {
    if (navigator.vibrate) navigator.vibrate(100);
}

/* HORLOGE */
setInterval(() => {
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString("fr-FR");
}, 1000);

/* 📍 LOCALISATION */
let savedLocation = "Localisation...";

function getCity(lat, lon) {
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
        .then(r => r.json())
        .then(data => {
            const a = data.address || {};
            savedLocation =
                a.city || a.town || a.village || a.suburb || "Ville";
        });
}

/* VALIDATION */
function validate() {

    beep();
    vibrate();

    document.getElementById("home").style.display = "none";
    document.getElementById("ticket").style.display = "flex";

    document.getElementById("time").innerText =
        new Date().toLocaleTimeString("fr-FR");

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => getCity(pos.coords.latitude, pos.coords.longitude),
            () => savedLocation = "Localisation refusée"
        );
    }

    setTimeout(() => {
        document.getElementById("location").innerText = savedLocation;
    }, 700);

    setTimeout(() => {
        document.getElementById("ticket").style.display = "none";
        document.getElementById("home").style.display = "flex";
    }, 3000);
}

</script>

</body>
</html>
